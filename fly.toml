# fly.toml app configuration file generated for ahaha-s on 2026-07-19T14:07:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ahaha-s'
primary_region = 'iad'

[build]

[env]
  PORT = "25565"

[[services]]
  internal_port = 25565
  protocol = "tcp"
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = []


[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
